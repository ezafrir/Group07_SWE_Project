<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="newChatBtn" class="new-chat-btn" title="New Chat">＋</button>
      </div>
      <ul id="chatList"></ul>

      <h2 class="sidebar-section-title">Bookmarked</h2>
      <ul id="bookmarkList"></ul>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbarRow">
          <h1 id="mainHeading">How can I help you?</h1>
          <div class="userControls">
            <span id="userInfo"></span>
            <button id="logoutBtn">Log Out</button>
          </div>
        </div>
      </div>

      <div class="settings">
        <label>
          <input type="checkbox" id="shortenToggle" />
          Shorten response
        </label>
        <label>
          Max words:
          <input type="number" id="wordLimit" value="200" min="1" />
        </label>
        <button id="saveSettingsBtn">Save Settings</button>
      </div>

      <div class="queryBox">
        <input type="text" id="promptInput" placeholder="Type your query..." />
        <button id="sendBtn">Send</button>
        <input type="text" id="searchInput" placeholder="Search conversations..." />
        <button id="searchBtn">Search</button>
        <button id="clearSearchBtn">Clear</button>
      </div>

      <!-- Thread view for active conversation (UC2 + UC3) -->
      <section id="threadSection" class="thread-section" style="display:none;">
        <div class="thread-header">
          <h2 id="threadTitle"></h2>
          <div class="thread-actions">
            <button id="threadBookmarkBtn">Bookmark</button>
            <button id="threadUnbookmarkBtn">Unbookmark</button>
            <button id="threadDeleteBtn" class="danger-btn">Delete</button>
          </div>
        </div>
        <div id="threadMessages" class="thread-messages"></div>
      </section>

      <!-- Search results / fallback -->
      <section id="responseSection"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
